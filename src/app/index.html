// --- Init ---
async function init() {
  checkHealth();
  setWorkflow('t2i');
  setInterval(checkHealth, 30000);
}

async function checkHealth() {
  try {
    const resp = await fetch(`${BASE_URL}/api/system_stats`, {signal: AbortSignal.timeout(5000)});
    const data = await resp.json();
    document.getElementById('statusDot').className = 'dot ok';
    document.getElementById('statusText').textContent = `ComfyUI v${data.system.comfyui_version} | VRAM: ${Math.round(data.devices?.[0]?.vram_free/1024/1024 || 0)}MB free`;
  } catch {
    document.getElementById('statusDot').className = 'dot down';
    document.getElementById('statusText').textContent = 'Disconnected';
  }
}

// --- Workflow ---
function setWorkflow(type) {
  currentWorkflow = type;
  document.getElementById('btn-t2i').className = type === 't2i' ? 'btn btn-primary' : 'btn btn-secondary';
  document.getElementById('btn-i2i').className = type === 'i2i' ? 'btn btn-primary' : 'btn btn-secondary';
  document.getElementById('uploadSection').style.display = type === 'i2i' ? 'block' : 'none';

  if (type === 't2i') {
    document.getElementById('denoise').value = '1.0';
    document.getElementById('denoise').nextElementSibling.textContent = '1.0';
  } else {
    document.getElementById('denoise').value = '0.72';
    document.getElementById('denoise').nextElementSibling.textContent = '0.72';
  }
}

// --- Upload ---
async function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const area = document.getElementById('uploadArea');
  area.innerHTML = '<div class="spinner"></div><p>Uploading...</p>';

  try {
    const formData = new FormData();
    formData.append('image', file);
    formData.append('type', 'input');
    formData.append('overwrite', 'true');

    const resp = await fetch(`${BASE_URL}/upload/image`, {method: 'POST', body: formData});
    const data = await resp.json();
    uploadedImageName = data.name;

    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    area.innerHTML = '';
    area.appendChild(img);

    log('Uploaded: ' + data.name, 'success');
  } catch (e) {
    area.innerHTML = '<p>Upload failed. Click to retry.</p>';
    log('Upload error: ' + e.message, 'error');
  }
}

// --- Presets ---
function loadPresets() {
  const category = document.getElementById('presetCategory').value;
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';

  if (!category || !PRESETS[category]) return;

  PRESETS[category].forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'preset';
    div.textContent = p.name;
    div.onclick = () => {
      document.getElementById('positivePrompt').value = p.prompt;
      if (p.denoise !== undefined) {
        document.getElementById('denoise').value = p.denoise;
        document.getElementById('denoise').nextElementSibling.textContent = p.denoise;
        if (p.denoise < 1) setWorkflow('i2i');
      }
      document.querySelectorAll('.preset').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
    };
    grid.appendChild(div);
  });
}

// --- Build Payload ---
function buildPayload() {
  const prompts = {
    positive: document.getElementById('positivePrompt').value,
    negative: document.getElementById('negativePrompt').value
  };

  const config = {
    width: parseInt(document.getElementById('width').value),
    height: parseInt(document.getElementById('height').value),
    steps: parseInt(document.getElementById('steps').value),
    cfg: 1.0,
    denoise: parseFloat(document.getElementById('denoise').value),
    sampler: document.getElementById('sampler').value,
    scheduler: document.getElementById('scheduler').value,
    seed: parseInt(document.getElementById('seed').value) || Math.floor(Math.random() * 999999999)
  };

  // Collect active LoRAs
  const loras = [];
  Object.entries(LORA_MAP).forEach(([id, filename]) => {
    if (document.getElementById(id).checked) {
      const str = parseFloat(document.getElementById(id + '_str').value);
      loras.push({name: filename, strength_model: str, strength_clip: str});
    }
  });

  // Build ComfyUI workflow
  const workflow = {};

  workflow["1"] = {class_type: "CheckpointLoaderSimple", inputs: {ckpt_name: "Qwen-Rapid-AIO-NSFW-v18.1.safetensors"}};

  let modelSource = "1";
  let clipSource = "1";

  loras.forEach((lora, i) => {
    const nid = `${10 + i}`;
    workflow[nid] = {
      class_type: "LoraLoader",
      inputs: {model: [modelSource, 0], clip: [clipSource, 1], lora_name: lora.name, strength_model: lora.strength_model, strength_clip: lora.strength_clip}
    };
    modelSource = nid;
    clipSource = nid;
  });

  if (currentWorkflow === 'i2i' && uploadedImageName) {
    workflow["7"] = {class_type: "LoadImage", inputs: {image: uploadedImageName, upload: "image"}};
  }

  const positiveNode = {class_type: "TextEncodeQwenImageEditPlus", inputs: {clip: [clipSource, 1], vae: ["1", 2], prompt: prompts.positive}};
  if (currentWorkflow === 'i2i' && uploadedImageName) positiveNode.inputs.image1 = ["7", 0];
  workflow["3"] = positiveNode;

  workflow["4"] = {class_type: "TextEncodeQwenImageEditPlus", inputs: {clip: [clipSource, 1], vae: ["1", 2], prompt: prompts.negative}};
  workflow["9"] = {class_type: "EmptyLatentImage", inputs: {width: config.width, height: config.height, batch_size: 1}};
  workflow["2"] = {class_type: "KSampler", inputs: {model: [modelSource, 0], positive: ["3", 0], negative: ["4", 0], latent_image: ["9", 0], seed: config.seed, steps: config.steps, cfg: config.cfg, sampler_name: config.sampler, scheduler: config.scheduler, denoise: config.denoise}};
  workflow["5"] = {class_type: "VAEDecode", inputs: {samples: ["2", 0], vae: ["1", 2]}};
  workflow["6"] = {class_type: "SaveImage", inputs: {images: ["5", 0], filename_prefix: "app_output"}};

  return {prompt: workflow};
}

// --- Generate ---
async function generate() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';

  try {
    if (currentWorkflow === 'i2i' && !uploadedImageName) {
      throw new Error('Upload an image first for I2I');
    }

    const payload = buildPayload();
    log('Queuing prompt...', 'info');

    const resp = await fetch(`${BASE_URL}/api/prompt`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    const data = await resp.json();

    if (data.node_errors && Object.keys(data.node_errors).length > 0) {
      throw new Error('Node errors: ' + JSON.stringify(data.node_errors));
    }

    const promptId = data.prompt_id;
    log(`Queued: ${promptId}`, 'info');

    // Poll
    const startTime = Date.now();
    const timeout = 120000;

    while (Date.now() - startTime < timeout) {
      await new Promise(r => setTimeout(r, 2000));

      const histResp = await fetch(`${BASE_URL}/api/history/${promptId}`);
      const histData = await histResp.json();

      if (histData[promptId]?.status?.status_str === 'success') {
        const images = histData[promptId].outputs?.["6"]?.images || [];
        if (images.length > 0) {
          const filename = images[0].filename;
          const imageUrl = `${BASE_URL}/view?filename=${encodeURIComponent(filename)}&type=output`;

          addToGallery(imageUrl, filename, {
            workflow: currentWorkflow,
            prompt: document.getElementById('positivePrompt').value.substring(0, 80) + '...',
            time: ((Date.now() - startTime) / 1000).toFixed(1) + 's'
          });

          log(`Done: ${filename} (${((Date.now() - startTime) / 1000).toFixed(1)}s)`, 'success');
          break;
        }
      }

      if (histData[promptId]?.status?.status_str === 'error') {
        throw new Error('Generation failed');
      }
    }

  } catch (e) {
    log('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

// --- Gallery ---
function addToGallery(imageUrl, filename, meta) {
  const gallery = document.getElementById('gallery');

  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.innerHTML = `
    <img src="${imageUrl}" loading="lazy">
    <div class="info">
      <div class="title">${filename}</div>
      <div class="meta">${meta.workflow.toUpperCase()} | ${meta.time}</div>
      <div class="meta" style="margin-top:4px">${meta.prompt}</div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary btn-small" onclick="useAsInput('${imageUrl}', '${filename}')">Use as I2I Input</button>
      <button class="btn btn-secondary btn-small" onclick="setCompare('${imageUrl}')">Compare</button>
      <a href="${imageUrl}" download="${filename}" class="btn btn-secondary btn-small">Download</a>
    </div>
  `;

  gallery.prepend(item);
  generatedImages.unshift({url: imageUrl, filename, meta});
}

function useAsInput(imageUrl, filename) {
  setWorkflow('i2i');
  uploadedImageName = filename;
  document.getElementById('uploadArea').innerHTML = `<img src="${imageUrl}">`;
  document.getElementById('presetCategory').value = 'i2i_scenes';
  loadPresets();
  log('Set as I2I input: ' + filename, 'info');
}

function setCompare(imageUrl) {
  const panel = document.getElementById('compareOriginal');
  panel.innerHTML = `<img src="${imageUrl}" style="width:100%;border-radius:8px">`;
}

// --- Tabs ---
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById(`${tab}Panel`).classList.add('active');
}

// --- Free Memory ---
async function freeMemory() {
  try {
    await fetch(`${BASE_URL}/api/free`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({unload_models: true, free_memory: true})
    });
    log('VRAM freed', 'success');
    checkHealth();
  } catch (e) {
    log('Free memory error: ' + e.message, 'error');
  }
}

// --- Log ---
function log(msg, type = 'info') {
  const logEl = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML += `<div class="entry ${type}">[${time}] ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

init();
</script>
